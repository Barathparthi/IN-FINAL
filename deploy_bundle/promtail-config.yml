server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_logs
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            attrs: attrs
      - json:
          source: log
          expressions:
            level: level
            msg: msg
            method: method
            status: status_code
            err: err
      - labels:
          level: level
          stream: stream
          container_name: attrs
      - regex:
          source: attrs
          expression: '.*container_name=(?P<container>.+?),.*'
      - labels:
          container: container
      - drop:
          source: level
          expression: 'debug'
      - output:
          source: msg