services:
  - type: web
    name: indium-api
    runtime: node
    plan: starter # or free, but free tier sleeps
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: indium-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false # Set this in dashboard
      - key: CLIENT_URL
        sync: false # Set this in dashboard (Frontend URL)

databases:
  - name: indium-db
    plan: starter
    databaseName: indium
    user: indium_user
